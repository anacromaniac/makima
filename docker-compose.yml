services:
  postgres:
    image: postgres:18-alpine
    container_name: makima-postgres
    environment:
      POSTGRES_DB: makima
      POSTGRES_USER: makima
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Tune PostgreSQL for Raspberry Pi 3 (1GB RAM)
    command:
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makima -d makima"]
      interval: 5s
      timeout: 5s
      retries: 5

  makima-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: makima-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use postgres service name instead of localhost
      DATABASE_URL: postgresql://makima:password@postgres:5432/makima
    ports:
      - "3000:3000"

volumes:
  postgres-data:
